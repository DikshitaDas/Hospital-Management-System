<main class="auth-shell forgot-shell">
  <section class="form-panel glass">
    <a routerLink="/login" class="back-link">← Back to sign in</a>
    <h1>Reset password</h1>
    <p class="lead">Enter your UHID and registered mobile number to set a new password.</p>

    @if (errorMsg()) { <div class="alert error">{{ errorMsg() }}</div> }
    @if (successMsg()) { <div class="alert success">{{ successMsg() }}</div> }

    <form (ngSubmit)="onSubmit(f)" #f="ngForm" class="form-stack">
      <label>UHID<input name="uhid" [(ngModel)]="uhid" required autocomplete="username" /></label>
      <label>Registered mobile<input name="mobile" [(ngModel)]="mobile" required /></label>
      <label>New password<input name="np" type="password" [(ngModel)]="newPassword" required minlength="8" /></label>
      <label>Confirm password<input name="cp" type="password" [(ngModel)]="confirmPassword" required minlength="8" /></label>
      <button class="primary-button submit-btn" type="submit" [disabled]="loading()">
        {{ loading() ? 'Saving…' : 'Reset password' }}
      </button>
    </form>
  </section>
</main>
