@if (open()) {
  <div class="drawer-backdrop" (click)="closed.emit()"></div>
  <aside class="drawer glass" [class.open]="open()" [attr.aria-label]="title()">
    <header>
      <h2>{{ title() }}</h2>
      <button class="icon-button" type="button" aria-label="Close drawer" (click)="closed.emit()">
        <svg lucideX size="18"></svg>
      </button>
    </header>
    <ng-content />
  </aside>
}
