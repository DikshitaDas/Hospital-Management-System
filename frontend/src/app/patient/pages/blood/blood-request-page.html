<header class="page-header">
  <div><span>Blood Request</span><h1>Request blood</h1><p>Submit a standard or emergency blood request to the hospital blood bank.</p></div>
</header>

<section class="glass data-panel ui-card form-section">
  <form class="form-grid" (ngSubmit)="submit()">
    <label class="checkbox-row">
      <input type="checkbox" [ngModel]="emergency()" (ngModelChange)="emergency.set($event)" name="emergency" />
      Emergency blood request (priority handling)
    </label>
    <label>Blood group
      <select [(ngModel)]="bloodGroup" name="bg" required>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
      </select>
    </label>
    <label>Units required
      <input [(ngModel)]="unitsRequired" name="units" type="number" min="1" required />
    </label>
    <div class="page-actions">
      <button class="primary-button btn-sm" type="submit">Submit request</button>
    </div>
  </form>
</section>

<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
