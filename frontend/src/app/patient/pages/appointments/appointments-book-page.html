<header class="page-header">
  <div><span>Appointments</span><h1>Book appointment</h1><p>Choose a doctor and preferred date.</p></div>
</header>

<section class="glass data-panel ui-card form-section">
  <form class="form-grid" (ngSubmit)="submit()">
    <app-searchable-select
      label="Doctor"
      placeholder="Search doctor name or UHID…"
      [required]="true"
      [displayWith]="doctorLabel"
      valueKey="id"
      [searchFn]="searchDoctors"
      [selectedId]="doctorId || null"
      (selectedIdChange)="doctorId = $event ?? 0"
    />
    <app-date-picker
      label="Appointment date"
      [value]="appointmentDate"
      (valueChange)="appointmentDate = $event"
    />
    @if (dateError()) {
      <p class="field-error">{{ dateError() }}</p>
    }
    <div class="page-actions">
      <button class="primary-button btn-sm" type="submit">Book appointment</button>
    </div>
  </form>
</section>

<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
