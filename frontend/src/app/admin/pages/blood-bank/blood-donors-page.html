<header class="page-header">
  <div><span>Blood Bank</span><h1>Donor List</h1><p>Register and manage blood donors.</p></div>
  <button class="primary-button btn-sm" type="button" (click)="addOpen.set(true)">+ Register Donor</button>
</header>

<div class="toolbar glass data-panel">
  <input type="search" placeholder="Search donor..." [ngModel]="searchTerm()" (ngModelChange)="searchTerm.set($event)" />
  <button class="ghost-button btn-sm" type="button" (click)="load()">Refresh</button>
</div>

@if (loading()) {
  <div class="loading-box glass data-panel">Loading donors...</div>
} @else {
  <section class="glass data-panel ui-card">
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr><th>ID</th><th>Name</th><th>Group</th><th>Mobile</th></tr></thead>
        <tbody>
          @for (d of filtered(); track d.id) {
            <tr><td>{{ d.id }}</td><td>{{ d.donorName }}</td><td><span class="badge rose">{{ d.bloodGroup }}</span></td><td>{{ d.mobile }}</td></tr>
          } @empty {
            <tr><td colspan="4" class="empty-box">No donors yet.</td></tr>
          }
        </tbody>
      </table>
    </div>
  </section>
}

<app-modal [open]="addOpen()" title="Register donor" (closed)="addOpen.set(false)">
  <form class="form-grid" (ngSubmit)="submit()">
    <input [(ngModel)]="form.donorName" name="dname" placeholder="Donor name" required />
    <select [(ngModel)]="form.bloodGroup" name="dbg">
      @for (g of ['A+','A-','B+','B-','AB+','AB-','O+','O-']; track g) { <option [value]="g">{{ g }}</option> }
    </select>
    <input [(ngModel)]="form.mobile" name="dmob" placeholder="10-digit mobile" required />
    <button class="primary-button btn-sm" type="submit">Save donor</button>
  </form>
</app-modal>

<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
