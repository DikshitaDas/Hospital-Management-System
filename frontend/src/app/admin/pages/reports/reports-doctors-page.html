<header class="page-header"><div><span>Reports</span><h1>Doctor Reports</h1></div><button class="primary-button" type="button" (click)="exportCsv()">Export CSV</button></header>
@if (errorMsg()) { <div class="alert error glass data-panel">{{ errorMsg() }}</div> }
<div class="alert info glass data-panel">Export all doctor profiles to CSV.</div>
<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
