<header class="page-header">
  <div><span>Appointments</span><h1>All Appointments</h1></div>
  <button class="primary-button" type="button" (click)="openBook()">Book Appointment</button>
</header>
@if (loading()) { <div class="loading-box glass data-panel">Loading...</div> }
@else if (errorMsg()) { <div class="alert error glass data-panel">{{ errorMsg() }}</div> }
@else {
<section class="glass data-panel">
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr><th>Date</th><th>Patient</th><th>Doctor</th><th>Token</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        @for (a of appointments(); track a.id) {
          <tr>
            <td>{{ a.appointmentDate }}</td>
            <td>{{ a.patient?.name }}</td><td>{{ a.doctor?.name }}</td><td>{{ a.tokenNumber }}</td>
            <td><span class="badge" [class]="badgeClass(a.status)">{{ a.status }}</span></td>
            <td class="row-actions">
              <button class="ghost-button" type="button" (click)="approve(a.id)">Approve</button>
              <button class="ghost-button" type="button" (click)="openReschedule(a)">Reschedule</button>
              <button class="ghost-button" type="button" (click)="cancel(a.id)">Cancel</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
}
<app-modal [open]="bookOpen()" title="Book Appointment" (closed)="bookOpen.set(false)">
  <form class="form-grid" (ngSubmit)="submitBook()">
    <select [(ngModel)]="bookForm.patientId" name="bp" required><option [ngValue]="0" disabled>Patient</option>@for (p of patients(); track p.id) { <option [ngValue]="p.id">{{ p.name }}</option> }</select>
    <select [(ngModel)]="bookForm.doctorId" name="bd" required><option [ngValue]="0" disabled>Doctor</option>@for (d of doctors(); track d.id) { <option [ngValue]="d.id">{{ d.name }}</option> }</select>
    <input [(ngModel)]="bookForm.appointmentDate" name="bdate" type="datetime-local" required />
    <button class="primary-button" type="submit">Book</button>
  </form>
</app-modal>
<app-modal [open]="rescheduleOpen()" title="Reschedule" (closed)="rescheduleOpen.set(false)">
  <form class="form-grid" (ngSubmit)="submitReschedule()">
    <input [(ngModel)]="rescheduleForm.appointmentDate" name="rdate" type="datetime-local" required />
    <button class="primary-button" type="submit">Save</button>
  </form>
</app-modal>
<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
