<header class="page-header"><div><span>Settings</span><h1>Hospital Profile</h1></div></header>
@if (loading()) { <div class="loading-box glass data-panel">Loading profile...</div> }
@else if (errorMsg()) { <div class="alert error glass data-panel">{{ errorMsg() }}</div> }
@else {
<section class="content-grid-2">
  <article class="glass data-panel">
    <h2 style="margin:0 0 12px;font-size:16px">Admin Profile</h2>
    @if (profile()) { <p class="badge sky">UHID: {{ profile()!.uhid }}</p> }
    <form class="form-grid" (ngSubmit)="saveProfile()">
      <input [(ngModel)]="profileForm.name" name="pname" required />
      <select [(ngModel)]="profileForm.gender" name="pgender"><option value="MALE">Male</option><option value="FEMALE">Female</option></select>
      <input [(ngModel)]="profileForm.age" name="page" type="number" required />
      <input [(ngModel)]="profileForm.mobile" name="pmobile" required />
      <button class="primary-button" type="submit">Save Profile</button>
    </form>
  </article>
  <article class="glass data-panel">
    <h2 style="margin:0 0 12px;font-size:16px">Change Password</h2>
    <form class="form-grid" (ngSubmit)="changePassword()">
      <input [(ngModel)]="passwordForm.oldPassword" name="old" type="password" placeholder="Current password" required />
      <input [(ngModel)]="passwordForm.newPassword" name="new" type="password" placeholder="New password" required />
      <button class="primary-button" type="submit">Change Password</button>
    </form>
  </article>
</section>
}
<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
