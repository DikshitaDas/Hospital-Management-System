<header class="page-header">
  <div><span>Billing</span><h1>Invoices</h1></div>
</header>
@if (loading()) { <div class="loading-box glass data-panel">Loading...</div> }
@else if (errorMsg()) { <div class="alert error glass data-panel">{{ errorMsg() }}</div> }
@else {
<section class="glass data-panel">
  <div class="toolbar">
    <label class="checkbox-row"><input type="checkbox" [checked]="showPendingOnly()" (change)="showPendingOnly.set(!showPendingOnly())" /> Pending only</label>
  </div>
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr><th>ID</th><th>Patient</th><th>Type</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
      <tbody>
        @for (b of filteredBills(); track b.id) {
          <tr>
            <td>{{ b.id }}</td><td>{{ b.patient?.name }}</td><td>{{ b.billType }}</td>
            <td>Rs. {{ b.amount }}</td><td>{{ b.billDate }}</td>
            <td><span class="badge" [class]="badgeClass(b.status)">{{ b.status }}</span></td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
<section class="glass data-panel ui-card">
  <h2>Create invoice</h2>
  <form class="form-grid two-col" (ngSubmit)="submit()">
    <app-searchable-select
      label="Patient"
      placeholder="Search patient…"
      [required]="true"
      [displayWith]="patientLabel"
      valueKey="id"
      [searchFn]="searchPatients"
      [selectedId]="form.patientId || null"
      (selectedIdChange)="form.patientId = $event ?? 0"
    />
    <label>Amount<input [(ngModel)]="form.amount" name="amt" type="number" required /></label>
    <label>Bill type
      <select [(ngModel)]="form.billType" name="btype">
        <option value="CONSULTATION">Consultation</option>
        <option value="LAB">Lab</option>
        <option value="WARD">Ward</option>
        <option value="PHARMACY">Pharmacy</option>
        <option value="OTHER">Other</option>
      </select>
    </label>
    <div class="page-actions">
      <button class="primary-button btn-sm" type="submit">Create bill</button>
    </div>
  </form>
</section>
}
<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
