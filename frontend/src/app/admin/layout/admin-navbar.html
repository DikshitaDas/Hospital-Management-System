<header class="navbar glass">
  <div class="brand-row">
    <div class="brand-mark">MH</div>
    <div>
      <span>MediCare Hub</span>
      <strong>Admin Console</strong>
    </div>
  </div>

  <label class="search">
    <span class="sr-only">Search</span>
    <input type="search" placeholder="Search patients by name..." (keyup.enter)="onSearch($event)" />
  </label>

  <div class="actions">
    <button class="icon-button" type="button" title="Notifications" (click)="openNotifications()">
      🔔
      @if (notifications().length) {
        <i class="dot"></i>
      }
    </button>

    <div class="profile-menu">
      <button class="profile-button" type="button" (click)="toggleProfile()">
        <span class="avatar">{{ userName.charAt(0) }}</span>
        <span>
          <strong>{{ userName }}</strong>
          <small>{{ userUhid }}</small>
        </span>
      </button>
      @if (profileOpen()) {
        <div class="profile-dropdown glass">
          <button type="button" (click)="goProfile()">Admin Profile</button>
          <button type="button" class="logout-item" (click)="logout()">Logout</button>
        </div>
      }
    </div>

    <button class="ghost-button logout-button" type="button" (click)="logout()">Logout</button>
  </div>
</header>

<app-drawer [open]="drawerOpen()" title="Notifications" (closed)="drawerOpen.set(false)">
  <div class="drawer-list">
    @if (notifications().length === 0) {
      <article><strong>No notifications</strong><span>System alerts will appear here.</span></article>
    } @else {
      @for (note of notifications(); track note.id) {
        <article>
          <strong>{{ note.title }}</strong>
          <span>{{ note.message }}</span>
        </article>
      }
    }
  </div>
</app-drawer>

<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
