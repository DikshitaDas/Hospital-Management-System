<header class="navbar glass">
  <div class="brand-row">
    <div class="brand-mark">MH</div>
    <div>
      <span>MediCare Hub</span>
      <strong>Admin Console</strong>
    </div>
  </div>

  <label class="search">
    <span class="sr-only">Search</span>
    <input
      type="search"
      placeholder="Search name, UHID or mobile…"
      #searchBox
      (keyup.enter)="onSearchInput(searchBox.value)"
    />
  </label>

  <div class="actions">
    <button class="icon-button" type="button" title="Notifications" (click)="openNotifications()">
      🔔
      @if (notifications().length) {
        <i class="dot"></i>
      }
    </button>

    <div class="profile-menu">
      <button class="profile-button" type="button" (click)="toggleProfile(); $event.stopPropagation()">
        @if (avatarUrl) {
          <img class="avatar-img" [src]="avatarUrl" alt="" />
        } @else {
          <span class="avatar">{{ userName.charAt(0) }}</span>
        }
        <span class="profile-text">
          <strong>{{ userName }}</strong>
          <small>{{ userUhid }}</small>
        </span>
        <span class="chevron">{{ profileOpen() ? '▴' : '▾' }}</span>
      </button>
      @if (profileOpen()) {
        <div class="profile-dropdown glass" (click)="$event.stopPropagation()">
          <div class="dropdown-header">
            <strong>{{ userName }}</strong>
            <small>{{ userUhid }}</small>
          </div>
          <button type="button" (click)="goProfile()">My account</button>
          <button type="button" class="logout-item" (click)="logout()">Sign out</button>
        </div>
      }
    </div>
  </div>
</header>

<app-drawer [open]="drawerOpen()" title="Notifications" (closed)="drawerOpen.set(false)">
  <div class="drawer-list">
    @if (notifications().length === 0) {
      <article><strong>No notifications</strong><span>System alerts will appear here.</span></article>
    } @else {
      @for (note of notifications(); track note.id) {
        <article>
          <strong>{{ note.title }}</strong>
          <span>{{ note.message }}</span>
        </article>
      }
    }
  </div>
</app-drawer>

<app-snackbar [open]="snackbarOpen()" [message]="snackbarMessage()" (closed)="snackbarOpen.set(false)" />
